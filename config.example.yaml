app:
  name: poly-auto-trading
  env: development

database:
  url: sqlite:///./poly_auto_trading.db

binance:
  symbol: BTCUSDT
  rest_base_urls:
    - https://api.binance.com
    - https://api1.binance.com
    - https://api2.binance.com
    - https://api3.binance.com
  ws_base_urls:
    - wss://stream.binance.com:9443
  candle_history_limit: 300

polymarket:
  gamma_base_url: https://gamma-api.polymarket.com
  market_ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  refresh_seconds: 30
  ws_ping_seconds: 10
  ws_resubscribe_seconds: 30
  slug_lookback_count: 4
  slug_window_count: 6
  use_events_fallback: false

trading:
  enabled: false
  dry_run: true

risk:
  max_order_usdc: 25
  max_daily_loss_usdc: 100
  max_spread: 0.04
  min_liquidity: 100

frontend:
  cors_origins:
    - http://localhost:5173
    - http://127.0.0.1:5173

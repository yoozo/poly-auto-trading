app:
  name: poly-auto-trading
  env: development
  log_level: INFO
  log_format: console
  log_file_enabled: true
  log_file_path: backend/logs/app.log
  log_file_max_bytes: 10485760
  log_file_backup_count: 7
cors:
  origins:
  - http://localhost:5173
  - http://127.0.0.1:5173
auth:
  cookie_name: poly_auto_session
  session_ttl_seconds: 604800
  cookie_secure: false
binance:
  symbol: BTCUSDT
  archive_base_url: https://data.binance.vision
  archive_enabled: true
  rest_base_urls:
  - https://api.binance.com
  - https://api-gcp.binance.com
  - https://api1.binance.com
  - https://api2.binance.com
  - https://api3.binance.com
  - https://api4.binance.com
  ws_base_urls:
  - wss://stream.binance.com:9443
  - wss://stream.binance.com:443
  intervals:
  - 1m
  - 5m
  - 15m
  - 1h
  - 4h
  - 12h
  - 1d
  - 1w
  candle_history_limit: 500
  ws_enabled: true
polymarket:
  gamma_base_url: https://gamma-api.polymarket.com
  data_base_url: https://data-api.polymarket.com
  clob_base_url: https://clob.polymarket.com
  ws_enabled: true
  ws_market_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  user_ws_enabled: true
  ws_user_url: wss://ws-subscriptions-clob.polymarket.com/ws/user
  # 账户快照 REST 兜底刷新周期：拉 positions、balance/allowance、open orders；代码层最小值为 5 秒。
  account_refresh_seconds: 10
  # BTC Up/Down 市场发现的兜底间隔；真实调度会结合市场开始/结束边界动态提前刷新。
  market_refresh_seconds: 60
  # 在市场边界前后保留一个刷新窗口，用于及时发现新窗口 token 并重建 market WS 订阅。
  market_boundary_refresh_window_seconds: 3
  # 启动或异常情况下若没有发现市场，按这个间隔快速重试，避免空订阅长期挂起。
  market_empty_retry_seconds: 5
  # market WS 收到 new_market/market_resolved 后触发 REST 刷新的最小间隔，避免事件抖动造成高频拉取。
  market_signal_refresh_min_seconds: 30
  # 后端向前端广播 Polymarket 快照的节流间隔；不影响 Polymarket 上游 REST/WS 拉取频率。
  ws_broadcast_interval_seconds: 0.3
signals:
  interval_base_scores:
    1m: 1
    5m: 2
    15m: 3
    1h: 4
    4h: 5
  rsi_ema_diff_diff_bonus:
    12: 0
    15: 1
    19: 2
  rsi_bonus:
    70: 1
    80: 2
    90: 3
telegram:
  enabled_default: false
  rsi_low: 30
  rsi_high: 70
  rsi_extreme_low: 20
  rsi_extreme_high: 80
  rsi_ema_diff_abs: 8
  close_warning_seconds: 15
